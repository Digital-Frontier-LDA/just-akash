name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap, dependency-free, and first: the SOPS migration (v1.35.0) has already
  # been eroded twice by PRs that re-added a direct `secrets.X` reference, each
  # caught by hand after merge. This turns that into a gate.
  invariants:
    name: Repo invariants (SOPS-only secrets, changelog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Check repo invariants
        run: python3 .github/scripts/check_repo_invariants.py

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      # Run the gitleaks binary directly rather than gitleaks/gitleaks-action@v2.
      # The v2 action requires a paid GITLEAKS_LICENSE for organization repos;
      # the CLI itself is free and unlicensed and scans the full history.
      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          SHA256=5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          echo "${SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz -C /usr/local/bin gitleaks
          rm -f gitleaks.tar.gz
          gitleaks version

      - name: Run gitleaks
        run: gitleaks detect --source . --redact --verbose --exit-code 1

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        # Pinned to a SHA, not @main. A branch ref means every push to trufflehog's
        # default branch changes what this security job executes, with no release in
        # between — strictly worse than a version tag, and in a workflow whose whole
        # purpose is to be trustworthy. Resolved from the v3.95.9 tag object and
        # verified against the API. (just-akash#97)
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          extra_args: --only-verified

  detect-secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets
        run: |
          # SOPS files are ciphertext BY DESIGN — their high-entropy blobs are not
          # leaked secrets, and they rotate on every edit, so baselining them would
          # churn the baseline forever. Exclude the path instead.
          detect-secrets scan \
            --exclude-files '.secrets.baseline' \
            --exclude-files '.*\.sops\.(env|ya?ml|json)$' > .secrets.baseline.new
          python3 -c "
          import json, sys
          with open('.secrets.baseline') as f: old = json.load(f)
          with open('.secrets.baseline.new') as f: new = json.load(f)
          old_results = json.dumps(old.get('results', {}), sort_keys=True)
          new_results = json.dumps(new.get('results', {}), sort_keys=True)
          if old_results != new_results:
            print('::error::detect-secrets found new secrets. Update .secrets.baseline')
            sys.exit(1)
          print('No new secrets detected')
          "