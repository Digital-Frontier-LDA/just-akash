name: Provider smoke test

# Daily drift detector between just-akash and the configured providers. Deploys a
# throwaway probe to each preferred provider and exercises every provider-facing
# feature (deploy, status, exec, inject, logs, events, SSH transport, connect,
# HTTP ingress, in-place update), then destroys it. Fails if any provider fails
# any feature -- so a provider build that quietly breaks lease-shell/ingress (the
# way v0.14.2-df.1 returned HTTP 500 on lease-shell) is caught the next morning,
# not only when a PR happens to run the E2E jobs.

on:
  schedule:
    # TEMPORARY accumulation window (started 2026-07-14): every 3h to build a
    # stable latency dataset over ~2-3 days for percentile/SLO thresholds. Each
    # run is fully leak-guarded (in-job reap + startup sweep). REVERT to the
    # daily line below on/after 2026-07-17 to limit Actions minutes and cost.
    - cron: "0 */3 * * *" # every 3 hours (accumulation burst)
    # - cron: "0 7 * * *" # 07:00 UTC daily (normal cadence — restore after the burst)
  workflow_dispatch:
    inputs:
      all:
        description: "Also test the backup provider tier (AKASH_PROVIDERS_BACKUP)"
        type: boolean
        default: false

# Serialize runs and NEVER cancel one mid-flight: a run holds live probe leases it
# must destroy in its cleanup, and a hard cancel would leak them. Queue instead.
concurrency:
  group: provider-smoke
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  smoke:
    name: Provider capability smoke test
    runs-on: ubuntu-latest
    # Ultimate backstop only. The real per-step bound is on the smoke step below,
    # NOT the job: a *job* timeout cancels the whole job, so the always()-cleanup
    # step below would never run and a live probe would leak until the next day's
    # startup sweep. A *step* timeout fails only that step and lets cleanup run.
    # Keep this comfortably above setup + smoke (40m) + reap (10m) so the job
    # backstop can never fire *during* the cleanup step and cancel it: worst case
    # is ~5m setup + 40m + 10m = 55m, so 70m leaves clear headroom.
    timeout-minutes: 70
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --dev

      # Cleanup (robust_destroy) shells out to `just destroy` / `just list`.
      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Run provider smoke test
        # Step-level timeout (not job-level) so a hang fails THIS step and still
        # lets the always()-cleanup step below reap any probe left behind.
        timeout-minutes: 40
        env:
          AKASH_API_KEY: ${{ secrets.AKASH_API_KEY }}
          AKASH_PROVIDERS: ${{ secrets.AKASH_PROVIDERS }}
          AKASH_PROVIDERS_BACKUP: ${{ secrets.AKASH_PROVIDERS_BACKUP }}
          # Comma-separated providers quarantined as genuinely-unreliable: they are
          # still deployed, tested, shown + recorded, but their PROVIDER-RELIABILITY
          # failures (LEASE-DOWN / proven ingress stall) do NOT gate the run — a
          # TOOLING regression on them still does. Keeps a known-bad provider
          # monitored without its infra flakiness reddening CI. Empty = none quarantined.
          SMOKE_QUARANTINE_PROVIDERS: ${{ secrets.SMOKE_QUARANTINE_PROVIDERS }}
          # Per-(provider,feature) outcome + latency, one JSON line each. Uploaded
          # as an artifact below; aggregate across runs to set percentile timeouts
          # and detect latency/success-rate regressions.
          SMOKE_TELEMETRY_FILE: ${{ github.workspace }}/smoke-telemetry.jsonl
        run: uv run python -m just_akash.smoke_providers ${{ inputs.all && '--all' || '' }}

      # Keep the run's latency/outcome telemetry even when the smoke step fails
      # (a red run's latencies are exactly what we want to inspect).
      - name: Upload smoke telemetry
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-telemetry-${{ github.run_id }}
          path: ${{ github.workspace }}/smoke-telemetry.jsonl
          if-no-files-found: ignore
          retention-days: 90

      # Safety net: reap any probe the smoke step leaked (step timeout, crash, or
      # a kill after create-on-chain but before the dseq was recorded, so the
      # step's own finally/signal cleanup could not fire). Runs even on failure
      # or cancellation. --min-age 0 reaps this run's *fresh* probe too, which the
      # default 1h age floor would spare; safe here because concurrency
      # (cancel-in-progress: false) guarantees no other run is in flight. This
      # shrinks a leaked-probe's lifetime from ~24h (next day's sweep) to seconds.
      # Only a runner-infra death (rare) still falls through to the daily sweep.
      - name: Reap any leaked probe
        if: always()
        timeout-minutes: 10
        env:
          AKASH_API_KEY: ${{ secrets.AKASH_API_KEY }}
        run: uv run python -m just_akash.smoke_providers --sweep-only --min-age 0

  # Accrue this run's telemetry onto the long-lived `telemetry` branch so the data
  # accumulates across runs (main is branch-protected; the telemetry branch is
  # not, and keeping data off main keeps its history clean). Isolated from the
  # smoke job so the privileged `contents: write` token never runs alongside the
  # deploy code. Runs even when the smoke job failed — a red run's latencies are
  # exactly what we want to keep.
  accrue:
    name: Accrue telemetry
    needs: smoke
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        continue-on-error: true # a crashed smoke run may have produced no artifact
        with:
          name: smoke-telemetry-${{ github.run_id }}
          path: dl
      - name: Append to telemetry branch
        env:
          SRC: dl/smoke-telemetry.jsonl
          RUN_ID: ${{ github.run_id }}
        run: bash .github/scripts/accrue-telemetry.sh

  # Track the metrics in CI: aggregate the ACCRUED data (all runs) into
  # per-(provider,feature) success rate + p50/p95/p99 and print it every run, and
  # gate on it. Checks out the repo (which has the analyzer — for the scheduled
  # runs that is the default branch; the telemetry branch is data-only) and reads
  # the accrued JSONL via `git show`. The analyzer is pure stdlib, so no
  # dependency install is needed.
  report:
    name: Telemetry report + SLO gate
    needs: accrue
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5 # pin the interpreter (module uses 3.10+ typing)
        with:
          python-version: "3.13"
      - name: Aggregate + SLO gate
        # Currently INFORMATIONAL (continue-on-error): it prints the table and any
        # reliability/latency breaches but does not fail the run. Once ~2-3 days
        # have accrued and p99s are stable: set SMOKE_LATENCY_SLO_P95 (e.g.
        # "ready=45000,ingress=15000" from the observed p99 + margin) and REMOVE
        # `continue-on-error` to actually fail a provider that's too slow / too
        # unreliable — the "fail slow providers" gate.
        continue-on-error: true
        env:
          SMOKE_LATENCY_SLO_P95: "" # empty = latency gate off until thresholds set
          SMOKE_SLO_MIN_SAMPLES: "20"
        run: |
          # Distinguish "branch doesn't exist yet" (a clean no-op) from a real
          # network/auth failure (which must NOT be silently reported as "no
          # branch"). This step is continue-on-error, so surfacing the failure
          # shows a red step without failing the workflow.
          if ! branches=$(git ls-remote --heads origin telemetry 2>&1); then
            echo "ERROR: could not reach remote to check telemetry branch:"
            echo "$branches"; exit 1
          fi
          if ! echo "$branches" | grep -q refs/heads/telemetry; then
            echo "no telemetry branch yet — nothing to report"; exit 0
          fi
          # Shallow: this job only reads the tip's data file; the telemetry
          # branch grows every run, so a full fetch would slow down over time.
          git fetch --depth 1 origin telemetry
          git show origin/telemetry:smoke-latency.jsonl > accrued.jsonl
          python3 -m just_akash.analyze_telemetry accrued.jsonl \
            --check --min-samples "$SMOKE_SLO_MIN_SAMPLES" --slo 0.95 \
            --max-p95 "$SMOKE_LATENCY_SLO_P95"
