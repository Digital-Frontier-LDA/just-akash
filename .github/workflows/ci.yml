name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff lint + format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: Pyright type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --dev

      - name: Cache pyright
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pyright
          key: pyright-${{ runner.os }}-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            pyright-${{ runner.os }}-

      - name: Pyright type check
        run: uv run pyright

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/ --tb=short -q

  e2e-shell:
    name: E2E lease-shell transport
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --dev

      - name: Install just
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2
        with:
          tool: just

      # AKASH_API_KEY / AKASH_PROVIDERS / SSH_PUBKEY come from secrets/ci.sops.env
      # (SOPS+age); SOPS_AGE_KEY is the only GitHub secret this needs.
      - name: Load SOPS secrets
        uses: ./.github/actions/sops-env
        with:
          age-key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Run E2E lease-shell test
        run: uv run python -m just_akash.test_shell_e2e

  e2e-secrets:
    name: E2E secrets injection
    runs-on: ubuntu-latest
    # Run after e2e-shell, never alongside it: both jobs deploy with the same
    # AKASH_API_KEY (one Akash account). Concurrent runs collide on the same
    # deployment and the stale-deployment recovery in deploy.py tears down the
    # other job's live deployment — surfacing as "manifest version validation
    # failed" (422) and "lease not active". Serializing keeps each job isolated.
    needs: e2e-shell
    if: always() && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --dev

      - name: Install just
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2
        with:
          tool: just

      # AKASH_API_KEY / AKASH_PROVIDERS come from secrets/ci.sops.env (SOPS+age).
      - name: Load SOPS secrets
        uses: ./.github/actions/sops-env
        with:
          age-key: ${{ secrets.SOPS_AGE_KEY }}

      # Runs AFTER the SOPS load on purpose: this job needs a throwaway keypair it
      # holds the private half of, so the generated SSH_PUBKEY must override the
      # one from the encrypted file (later $GITHUB_ENV write wins).
      - name: Generate SSH keypair
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N "" -C "akash-e2e"
          echo "SSH_KEY_PATH=~/.ssh/id_ed25519" >> "$GITHUB_ENV"
          echo "SSH_PUBKEY=$(cat ~/.ssh/id_ed25519.pub)" >> "$GITHUB_ENV"

      - name: Run E2E secrets test
        run: uv run python -m just_akash.test_secrets_e2e